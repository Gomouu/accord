# Configuration cargo-deny — audits de chaîne d'approvisionnement (CI: ci.yml,
# local: ci.sh si le binaire est installé).
#
# TODO: liste de licences établie sans exécution locale de `cargo deny check`
# (binaire absent sur la machine de dev) — elle est volontairement large ;
# resserrer à la première exécution CI si une entrée s'avère inutile, ou
# ajouter la licence manquante si une dépendance légitime est rejetée.

[advisories]
# Vulnérabilités connues (RUSTSEC) et code `unsound` restent des ERREURS qui
# bloquent la publication. En revanche :
# - `unmaintained = "workspace"` : ne bloque QUE sur un crate non maintenu dont
#   NOUS dépendons directement (actionnable). Les crates non maintenus tirés
#   transitivement par Tauri/GTK/Opus (gtk-rs, audiopus_sys, unic-*, paste,
#   instant, proc-macro-error…) sont hors de notre contrôle : signalés sans
#   faire échouer la CI, sinon la release serait bloquée par des dépendances
#   qu'on ne maîtrise pas.
# - `yanked = "warn"` : un crate retiré rencontré en transitif (ex. spin) est
#   signalé mais ne bloque pas une publication.
unmaintained = "workspace"
yanked = "warn"

[licenses]
# Seules les licences permissives (ou faiblement copyleft compatibles) sont
# acceptées ; tout SPDX hors liste fait échouer la CI.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "CC0-1.0",
  "Unicode-3.0",
  "MPL-2.0",
  # OpenSSL vendu par openssl-src (rusqlite bundled-sqlcipher-vendored-openssl)
  # et licence historique de ring si ce crate entre dans l'arbre un jour.
  "OpenSSL",
  # Magasin de certificats racines Mozilla (webpki-root-certs, tiré par
  # rustls via reqwest — chaîne HTTPS de tauri-plugin-updater, D-049) :
  # licence permissive de données, sans obligation sur le code.
  "CDLA-Permissive-2.0",
]

[bans]
# Les versions multiples d'un même crate gonflent le binaire mais ne sont pas
# une erreur : avertissement seulement.
multiple-versions = "warn"
