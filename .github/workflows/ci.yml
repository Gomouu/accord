# CI de validation Accord — miroir GitHub du gate local `ci.sh`.
#
# Invariant : ce workflow exécute exactement les mêmes commandes que ci.sh
# (Rust: fmt/clippy/test ; frontend: tsc/eslint/prettier/vitest/build), plus
# les audits de chaîne d'approvisionnement (cargo deny + cargo audit) qui sont
# optionnels en local mais obligatoires ici.
#
# Déclencheurs :
#   - push sur main (post-merge, garde le tronc vert) ;
#   - pull_request (validation avant merge) ;
#   - workflow_call (réutilisé comme job "test" par release.yml).
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  # audiopus_sys embarque un CMakeLists ancien : CMake >= 4 refuse son
  # cmake_minimum_required sans cette variable (même contournement que ci.sh).
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  validate:
    runs-on: ubuntu-latest
    # Garde-fou : un test qui pend (ex. E/S réseau bloquante propre au runner)
    # doit faire échouer le job en quelques minutes, pas tourner jusqu'au
    # plafond de 6 h par défaut — et ne jamais bloquer la release (`needs: test`).
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Dépendances système Tauri 2 — même liste que release.yml (webkit2gtk,
      # libopus pour la feature `hardware`, ALSA pour cpal…) + cmake pour la
      # compilation du Opus embarqué par audiopus_sys.
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libopus-dev \
            libasound2-dev \
            rpm \
            pkg-config \
            patchelf \
            cmake

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Cache des artefacts Rust (workspace racine -> ./target).
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Binaire précompilé (rapide) plutôt que `cargo install` (compilation).
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      # --- Rust (workspace complet, hôte Tauri inclus) ---

      - name: Rust format check
        run: cargo fmt --all --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --workspace --quiet

      # Licences + bannissements + avis de sécurité (config: deny.toml racine).
      - name: cargo deny
        run: cargo deny check

      # Vulnérabilités connues (RustSec) sur Cargo.lock.
      - name: cargo audit
        run: cargo audit

      # --- Frontend (app/) ---

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          # package.json exige >=20 <25 ; on valide sur la 22 (LTS courante).
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Frontend dependencies (npm ci)
        run: npm ci --prefix app

      - name: Frontend typecheck (tsc --noEmit)
        run: npx tsc --noEmit
        working-directory: ./app

      - name: Frontend lint (eslint)
        run: npm run lint --silent
        working-directory: ./app

      - name: Frontend format check (prettier)
        run: npx prettier --check src
        working-directory: ./app

      - name: Frontend tests (vitest run)
        run: npm test --silent
        working-directory: ./app

      - name: Frontend production build
        run: npm run build --silent
        working-directory: ./app
