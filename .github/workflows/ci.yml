# CI de validation Accord — miroir GitHub du gate local `ci.sh`.
#
# Invariant : ce workflow exécute exactement les mêmes commandes que ci.sh
# (Rust: fmt/clippy/test ; frontend: tsc/eslint/prettier/vitest/build), plus
# les audits de chaîne d'approvisionnement (cargo deny + cargo audit) qui sont
# optionnels en local mais obligatoires ici.
#
# Déclencheurs :
#   - push sur main (post-merge, garde le tronc vert) ;
#   - pull_request (validation avant merge) ;
#   - workflow_call (réutilisé comme job "test" par release.yml).
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  # audiopus_sys embarque un CMakeLists ancien : CMake >= 4 refuse son
  # cmake_minimum_required sans cette variable (même contournement que ci.sh).
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  validate:
    runs-on: ubuntu-latest
    # Garde-fou : un test qui pend (ex. E/S réseau bloquante propre au runner)
    # doit faire échouer le job en quelques minutes, pas tourner jusqu'au
    # plafond de 6 h par défaut — et ne jamais bloquer la release (`needs: test`).
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Dépendances système Tauri 2 — même liste que release.yml (webkit2gtk,
      # libopus pour la feature `hardware`, ALSA pour cpal…) + cmake pour la
      # compilation du Opus embarqué par audiopus_sys.
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libopus-dev \
            libasound2-dev \
            rpm \
            pkg-config \
            patchelf \
            cmake

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Cache des artefacts Rust (workspace racine -> ./target).
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Binaire précompilé (rapide) plutôt que `cargo install` (compilation).
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      # --- Rust (workspace complet, hôte Tauri inclus) ---

      - name: Rust format check
        run: cargo fmt --all --check

      # `debug_assert_with_mut_call` (nursery) : interdit tout appel mutant dans
      # un `debug_assert!` — son argument n'est PAS évalué en release. Cette
      # classe de bug a produit la 3.0.0→3.3.0 sans sessions initiateur (aucun
      # message échangé en production, tests debug tous verts).
      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings -D clippy::debug_assert_with_mut_call

      # Zéro panic en chemin de production (D23) : unwrap/expect/panic!/todo!
      # interdits dans les libs et binaires. Les tests inline sont exclus via
      # clippy.toml (allow-*-in-tests), les tests d'intégration par la portée
      # --lib --bins. Les rares infaillibilités prouvées (HKDF taille fixe,
      # HMAC toute clé) portent un #[allow] justifié. Même famille de
      # garde-fous que debug_assert_with_mut_call (régression 3.0.0→3.3.0).
      - name: Rust clippy anti-panic (libs + bins)
        run: >
          cargo clippy --workspace --lib --bins -- -D warnings
          -D clippy::debug_assert_with_mut_call
          -D clippy::unwrap_used -D clippy::expect_used
          -D clippy::panic -D clippy::todo -D clippy::unimplemented

      # Tests unitaires seulement (`--lib`) : déterministes et hermétiques. Les
      # tests d'intégration e2e (`crates/*/tests/*.rs`) lancent de vrais nœuds
      # P2P (UDP, DHT, poinçonnage NAT, temporisation de convergence) — fiables
      # sur une machine de dev avec un vrai réseau, mais fragiles/bloquants sur
      # un runner hébergé sans réseau P2P. Ils restent lancés en local par
      # `ci.sh` (`cargo test --workspace`), pas comme bloqueur de release.
      - name: Rust tests (unit)
        run: cargo test --workspace --lib --quiet

      # Le transport en PROFIL RELEASE : ces e2e SimNet sont hermétiques (réseau
      # simulé en mémoire, pas d'UDP réel — `tcp_link_e2e` reste exclu, il ouvre
      # de vraies sockets) et le comportement du code peut diverger entre profils
      # (`debug_assert!` non évalué en release — cause de la régression 3.0.0).
      # Ce pas aurait bloqué la 3.0.0.
      - name: Rust tests transport (release)
        run: >
          cargo test -p accord-transport --release --quiet
          --test handshake_e2e --test hole_punch_e2e
          --test relay_e2e --test relay_tunnel_e2e

      # Licences + bannissements + avis de sécurité (config: deny.toml racine).
      - name: cargo deny
        run: cargo deny check

      # Vulnérabilités connues (RustSec) sur Cargo.lock.
      - name: cargo audit
        run: cargo audit

      # --- Frontend (app/) ---

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          # package.json exige >=20 <25 ; on valide sur la 22 (LTS courante).
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Frontend dependencies (npm ci)
        run: npm ci --prefix app

      - name: Frontend typecheck (tsc --noEmit)
        run: npx tsc --noEmit
        working-directory: ./app

      - name: Frontend lint (eslint)
        run: npm run lint --silent
        working-directory: ./app

      - name: Frontend format check (prettier)
        run: npx prettier --check src
        working-directory: ./app

      - name: Frontend tests (vitest run)
        run: npm test --silent
        working-directory: ./app

      - name: Frontend production build
        run: npm run build --silent
        working-directory: ./app
